# Alternative: use the pre-built nopCommerce image from Docker Hub.
# Run with: make use-prebuilt
# This skips the source build entirely. You CANNOT customize plugins or themes.

services:
  postgres:
    image: postgres:16-alpine
    container_name: db-infra-postgres
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: DevPassword123!
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: db-infra-sqlserver
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "DevPassword123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"DevPassword123!\" -Q \"SELECT 1\" -C || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"DevPassword123!\" -Q \"SELECT 1\" -C",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: db-infra-redis
    command: redis-server --requirepass DevRedis123! --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "DevRedis123!", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  nopcommerce:
    image: nopcommerceteam/nopcommerce:4.90.4
    container_name: db-infra-nopcommerce
    ports:
      - "8080:80"
    volumes:
      - nopcommerce_data:/app/App_Data
    environment:
      DistributedCacheConfig__Enabled: "true"
      DistributedCacheConfig__DistributedCacheType: "Redis"
      DistributedCacheConfig__ConnectionString: "db-infra-redis:6379,password=DevRedis123!,ssl=False"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  sqlserver_data:
    driver: local
  redis_data:
    driver: local
  nopcommerce_data:
    driver: local
