# kind (Kubernetes in Docker) cluster configuration
# https://kind.sigs.k8s.io/docs/user/configuration/

apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: db-infra
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # PostgreSQL
      - containerPort: 30432
        hostPort: 5432
        protocol: TCP
      # SQL Server
      - containerPort: 31433
        hostPort: 1433
        protocol: TCP
      # Redis
      - containerPort: 30379
        hostPort: 6379
        protocol: TCP
      # HTTP (for ingress/monitoring)
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      # HTTPS
      - containerPort: 443
        hostPort: 443
        protocol: TCP
    extraMounts:
      # Mount host directory for persistent storage in dev
      - hostPath: /tmp/kind-data
        containerPath: /mnt/data
  - role: worker
    extraMounts:
      - hostPath: /tmp/kind-data
        containerPath: /mnt/data
  - role: worker
    extraMounts:
      - hostPath: /tmp/kind-data
        containerPath: /mnt/data
