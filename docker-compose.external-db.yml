# ═══════════════════════════════════════════════════════════
#  PRODUCTION: External PostgreSQL + nopCommerce + Redis
# ═══════════════════════════════════════════════════════════
#  Use this when you have an existing PostgreSQL server
#  (e.g., 192.168.0.107) and only need nopCommerce + Redis
#  running in Docker.
#
#  No local PostgreSQL or SQL Server containers are started.
#
#  Usage:
#    docker compose -f docker-compose.external-db.yml up -d
#    # or
#    make up-external
# ═══════════════════════════════════════════════════════════

services:
  nopcommerce:
    image: ${REGISTRY:-registry.arity.co.za}/nopcommerce:${IMAGE_TAG:-latest}
    container_name: ${NOPCOMMERCE_CONTAINER_NAME:-db-infra-nopcommerce}
    restart: unless-stopped
    ports:
      - "${NOPCOMMERCE_PORT:-8080}:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ConnectionStrings__DefaultConnection=${CONNECTION_STRING}
    networks:
      - nopcommerce-network

  redis:
    image: redis:7-alpine
    container_name: db-infra-redis
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - nopcommerce-network

volumes:
  redis_data:
    driver: local

networks:
  nopcommerce-network:
    driver: bridge
