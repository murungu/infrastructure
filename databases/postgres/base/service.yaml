apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: databases
  labels:
    app: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: postgres
---
# Optional: NodePort for direct access without port-forwarding
apiVersion: v1
kind: Service
metadata:
  name: postgres-nodeport
  namespace: databases
  labels:
    app: postgres
spec:
  type: NodePort
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 30432
      name: postgres
  selector:
    app: postgres
