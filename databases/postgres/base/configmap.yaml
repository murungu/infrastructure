apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: databases
  labels:
    app: postgres
data:
  POSTGRES_DB: "appdb"
  POSTGRES_USER: "appuser"
  # Password is set via Secret
  PGDATA: "/var/lib/postgresql/data/pgdata"
  # Performance and logging settings for dev
  POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
