apiVersion: v1
kind: Service
metadata:
  name: sqlserver
  namespace: databases
  labels:
    app: sqlserver
spec:
  type: ClusterIP
  ports:
    - port: 1433
      targetPort: 1433
      name: sqlserver
  selector:
    app: sqlserver
---
# Optional: NodePort for direct access
apiVersion: v1
kind: Service
metadata:
  name: sqlserver-nodeport
  namespace: databases
  labels:
    app: sqlserver
spec:
  type: NodePort
  ports:
    - port: 1433
      targetPort: 1433
      nodePort: 31433
      name: sqlserver
  selector:
    app: sqlserver
