apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: databases

resources:
  - ../../base

labels:
  - includeSelectors: true
    pairs:
      environment: dev
      app.kubernetes.io/instance: sqlserver-dev

# Dev-specific patches
patches:
  - target:
      kind: StatefulSet
      name: sqlserver
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
      # Remove amd64 node selector for Apple Silicon local dev
      # Docker Desktop with Rosetta 2 can emulate amd64 images
      - op: remove
        path: /spec/template/spec/nodeSelector
      # Increase probe delays for slow Rosetta emulation startup
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/initialDelaySeconds
        value: 60
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/initialDelaySeconds
        value: 180
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/periodSeconds
        value: 30
