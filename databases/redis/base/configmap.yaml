apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: databases
  labels:
    app: redis
data:
  redis.conf: |
    # Redis configuration
    bind 0.0.0.0
    port 6379
    protected-mode yes
    # Disable persistence for dev (enable for prod)
    save ""
    appendonly no
    maxmemory 512mb
    maxmemory-policy allkeys-lru
    # Logging
    loglevel notice
